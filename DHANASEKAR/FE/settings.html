<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Tea Factory Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .settings-nav-item.active {
            background-color: #f3f4f6;
            color: #7c3aed;
            border-left: 4px solid #7c3aed;
        }

        .settings-nav-item {
            border-left: 4px solid transparent;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Main Sidebar -->
        <div class="w-64 bg-gray-900 text-white flex-shrink-0">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div
                        class="w-12 h-12 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-industry text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Tea Factory</h2>
                        <p class="text-xs text-gray-400" id="userEmail">Loading...</p>
                    </div>
                </div>

                <nav class="space-y-2" id="sidebarNav">
                    <a href="employee-dashboard.html"
                        class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition">
                        <span>📊</span>
                        <span>Dashboard</span>
                    </a>
                    <a href="settings.html"
                        class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg bg-gray-800 transition">
                        <span>⚙️</span>
                        <span>Settings</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white shadow-sm border-b border-gray-200 flex-shrink-0">
                <div class="px-6 py-4 flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">System Settings</h1>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-3">
                            <span id="userInitials"
                                class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">U</span>
                            <div>
                                <p class="text-sm font-semibold text-gray-800" id="userName">User</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Settings Content Container -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Settings Sidebar -->
                <div class="w-64 bg-white border-r border-gray-200 overflow-y-auto">
                    <nav class="p-4 space-y-1">
                        <button onclick="showSection('company')" id="nav-company"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left active">
                            <i class="fas fa-building w-5"></i>
                            <span>Company / Factory</span>
                        </button>
                        <button onclick="showSection('users')" id="nav-users"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-users-cog w-5"></i>
                            <span>User & Roles</span>
                        </button>
                        <button onclick="showSection('raw_material')" id="nav-raw_material"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-leaf w-5"></i>
                            <span>Raw Materials</span>
                        </button>
                        <button onclick="showSection('production')" id="nav-production"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-industry w-5"></i>
                            <span>Production</span>
                        </button>
                        <button onclick="showSection('packaging')" id="nav-packaging"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-box-open w-5"></i>
                            <span>Packaging</span>
                        </button>
                        <button onclick="showSection('supplier')" id="nav-supplier"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-truck-loading w-5"></i>
                            <span>Suppliers</span>
                        </button>
                        <button onclick="showSection('transport')" id="nav-transport"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-truck w-5"></i>
                            <span>Transport</span>
                        </button>
                        <button onclick="showSection('payroll')" id="nav-payroll"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-money-check-alt w-5"></i>
                            <span>Payroll</span>
                        </button>
                        <button onclick="showSection('tax')" id="nav-tax"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-file-invoice-dollar w-5"></i>
                            <span>Tax & Billing</span>
                        </button>
                        <button onclick="showSection('reports')" id="nav-reports"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-chart-bar w-5"></i>
                            <span>Reports Config</span>
                        </button>
                        <button onclick="showSection('security')" id="nav-security"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-shield-alt w-5"></i>
                            <span>Security</span>
                        </button>
                        <button onclick="showSection('system')" id="nav-system"
                            class="settings-nav-item w-full flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 text-left">
                            <i class="fas fa-cogs w-5"></i>
                            <span>System</span>
                        </button>
                    </nav>
                </div>

                <!-- Settings Content Area -->
                <div class="flex-1 overflow-y-auto p-8 bg-gray-50">
                    <!-- Dynamic Content Container -->
                    <div id="settings-container" class="max-w-4xl mx-auto">
                        <!-- Content will be injected by JS -->
                        <div class="bg-white rounded-lg shadow-sm p-8 text-center text-gray-500">
                            <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                            <p>Loading settings...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 flex items-center space-x-2">
        <i class="fas fa-check-circle text-green-400"></i>
        <span id="toastMessage">Saved successfully</span>
    </div>

    <script src="role-utils.js"></script>
    <script src="settings.js"></script>
</body>

</html>
