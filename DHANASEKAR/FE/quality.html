<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Check - Tea Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-purple-600 hover:text-purple-800">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Quality Check</h1>
                        <p class="text-sm text-gray-600">Manage quality control and testing records</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- List -->
            <section class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-clipboard-check text-teal-600"></i>
                            Quality Records
                        </h2>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Status</label>
                            <select id="filterQualityStatus"
                                    class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="approved">approved</option>
                                <option value="hold">hold</option>
                                <option value="Reprocess">Reprocess</option>
                                <option value="rejected">rejected</option>
                            </select>
                        </div>
                        <button id="applyQualityFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-teal-500 text-white rounded-lg text-sm font-semibold hover:bg-teal-600 transition">
                            <i class="fas fa-filter mr-1"></i>Apply
                        </button>
                        <button id="resetQualityFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">
                            Reset
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Quality ID
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Batch No
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Production Date
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Checked By
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Color
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Aroma
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Taste
                                </th>
                            </tr>
                        </thead>
                        <tbody id="qualityTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="8" class="px-6 py-8 text-center text-gray-500">
                                    <div class="flex flex-col items-center">
                                        <div class="loader mb-4"></div>
                                        <p>Loading quality records...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="qualityEmptyState" class="hidden py-10 text-center text-gray-500">
                    <i class="fas fa-clipboard-check text-4xl text-gray-300 mb-3"></i>
                    <p>No quality records found. Add the first record using the form on the right.</p>
                </div>
            </section>

            <!-- Form -->
            <section class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-teal-600"></i>
                    Add Quality Check
                </h2>

                <form id="qualityForm" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Batch No</label>
                        <input type="text" id="batchNo" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g. BATCH-001">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Production Date</label>
                        <input type="date" id="productionDate" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                        <input type="date" id="expiryDate"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Checked By</label>
                        <input type="text" id="checkedBy" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g. John Doe / QC-001">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quality Standard No</label>
                        <input type="text" id="qualityStandardNo" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g. QS-2024-001">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Moisture (in percentage)</label>
                        <input type="text" id="moistureInPercentage" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                               placeholder="e.g. 5.5%">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quality Status</label>
                        <select id="qualityStatus" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                            <option value="">Select status</option>
                            <option value="approved">approved</option>
                            <option value="hold">hold</option>
                            <option value="Reprocess">Reprocess</option>
                            <option value="rejected">rejected</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                        <select id="color" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                            <option value="">Select color</option>
                            <option value="bright">bright</option>
                            <option value="dull">dull</option>
                            <option value="dark">dark</option>
                            <option value="light">light</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Aroma</label>
                        <select id="aroma" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                            <option value="">Select aroma</option>
                            <option value="strong">strong</option>
                            <option value="medium">medium</option>
                            <option value="weak">weak</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Taste</label>
                        <select id="taste" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                            <option value="">Select taste</option>
                            <option value="excellent">excellent</option>
                            <option value="good">good</option>
                            <option value="average">average</option>
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-teal-500 to-teal-600 text-white py-2.5 rounded-lg font-semibold hover:from-teal-600 hover:to-teal-700 transition">
                        <span id="qualitySubmitText">Save Quality Check</span>
                        <div id="qualitySubmitLoader" class="loader mx-auto hidden"></div>
                    </button>
                </form>

                <div id="qualityError" class="mt-3 p-2 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm hidden"></div>
                <div id="qualitySuccess" class="mt-3 p-2 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm hidden"></div>
            </section>
        </div>
    </main>

    
    <script src="role-utils.js"></script>
    <script src="quality.js"></script>
</body>
</html>
