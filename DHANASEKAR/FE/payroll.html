<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Management - Tea Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-900 text-white">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div
                        class="w-12 h-12 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-industry text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Tea Factory</h2>
                        <p class="text-xs text-gray-400" id="userEmail">Loading...</p>
                    </div>
                </div>

                <nav class="space-y-2" id="sidebarNav">
                    <!-- Standard Nav items will be here - we can copy from employee-dashboard or rely on JS to populate active state if we were robust, but static for now -->
                    <a href="employee-dashboard.html"
                        class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition">
                        <span>📊</span>
                        <span>Dashboard</span>
                    </a>
                    <a href="payroll.html"
                        class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg bg-gray-800 transition">
                        <span>💰</span>
                        <span>Payroll</span>
                    </a>
                    <!-- Other links for context -->
                    <div class="mt-8 pt-8 border-t border-gray-800">
                        <button onclick="logout()"
                            class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-red-600 transition text-red-400 hover:text-white">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 bg-gray-100 overflow-y-auto">
            <header class="bg-white shadow-sm border-b border-gray-200">
                <div class="px-6 py-4 flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">Payroll Management</h1>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-3">
                            <div
                                class="w-10 h-10 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center">
                                <span id="userInitials" class="text-white font-bold">U</span>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-gray-800" id="userName">User</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-6">
                <!-- Actions Bar -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex space-x-4">
                        <div class="relative">
                            <input type="text" id="searchInput" placeholder="Search payroll..."
                                class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                        <select id="filterType"
                            class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500">
                            <option value="">All Types</option>
                            <option value="salary">Salary</option>
                            <option value="supplier">Supplier</option>
                            <option value="transport">Transport</option>
                            <option value="purchase">Purchase</option>
                        </select>
                    </div>
                    <button onclick="toggleForm()"
                        class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition flex items-center space-x-2">
                        <i class="fas fa-plus"></i>
                        <span>New Payroll Entry</span>
                    </button>
                </div>

                <!-- Form Section -->
                <div id="payrollFormContainer"
                    class="hidden bg-white rounded-lg shadow-lg p-6 mb-6 border-l-4 border-purple-500">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Add New Payroll</h3>
                    <form id="payrollForm" class="space-y-6">

                        <!-- General Info -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Date</label>
                                <input type="date" name="payment_date" required
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payee Name</label>
                                <input type="text" name="payee_name" placeholder="Name"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₹)</label>
                                <input type="number" name="amount" required step="0.01"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Transaction ID</label>
                                <input type="text" name="transaction_id" placeholder="Txn ID"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>

                            <!-- Dropdowns -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Type</label>
                                <select name="payment_type" id="paymentTypeSelect" required
                                    onchange="handleTypeChange()"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                    <option value="">Select Type</option>
                                    <option value="salary">Salary</option>
                                    <option value="supplier">Supplier</option>
                                    <option value="transport">Transport</option>
                                    <option value="purchase">Purchase</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Category</label>
                                <select name="payment_category" required
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                    <option value="">Select Category</option>
                                    <option value="employee">Employee</option>
                                    <option value="vendor">Vendor</option>
                                    <option value="driver">Driver</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                                <select name="department"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                    <option value="">Select Department</option>
                                    <option value="leaf Collection">Leaf Collection</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Suppliers">Suppliers</option>
                                    <option value="production">Production</option>
                                    <option value="inventory">Inventory</option>
                                    <option value="quality">Quality</option>
                                    <option value="Accounts">Accounts</option>
                                    <option value="HR">HR</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Mode</label>
                                <select name="payment_mode" required
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                    <option value="cash">Cash</option>
                                    <option value="bank">Bank</option>
                                    <option value="upi">UPI</option>
                                    <option value="gpay">GPay</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Status</label>
                                <select name="payment_status" required
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                    <option value="paid">Paid</option>
                                    <option value="not paid">Not Paid</option>
                                    <option value="pending">Pending</option>
                                </select>
                            </div>
                        </div>

                        <hr class="border-gray-200">

                        <!-- Employee Section -->
                        <div id="employeeSection" class="hidden">
                            <h4 class="text-md font-semibold text-gray-800 mb-3"><i
                                    class="fas fa-user-tie mr-2"></i>Employee Details</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-50 p-4 rounded-lg">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
                                    <input type="text" name="employee_id" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Employee Name</label>
                                    <input type="text" name="employee_name" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Designation</label>
                                    <input type="text" name="designation" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Total Days
                                        Working</label>
                                    <input type="number" name="total_days_working" step="0.5"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Attendance Days</label>
                                    <input type="number" name="attendance_days" step="0.5"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Salary Amount
                                        (₹)</label>
                                    <input type="number" name="salary_amount" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Salary Type</label>
                                    <select name="salary_type" class="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select</option>
                                        <option value="daily">Daily</option>
                                        <option value="weekly">Weekly</option>
                                        <option value="monthly">Monthly</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Working Time</label>
                                    <select name="working_time" class="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select</option>
                                        <option value="parttime">Part Time</option>
                                        <option value="full time">Full Time</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Working Shift</label>
                                    <select name="working_shift" class="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select</option>
                                        <option value="morning">Morning</option>
                                        <option value="night">Night</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Supplier Section -->
                        <div id="supplierSection" class="hidden">
                            <h4 class="text-md font-semibold text-gray-800 mb-3"><i
                                    class="fas fa-boxes mr-2"></i>Supplier Details</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-50 p-4 rounded-lg">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Supplier ID</label>
                                    <input type="text" name="supplier_id" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Supplier Name</label>
                                    <input type="text" name="supplier_name" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Tax/GST No</label>
                                    <input type="text" name="tax_gst" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Supplier Total
                                        Amount</label>
                                    <input type="number" name="supplier_total_amount" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
                                    <input type="number" name="quantity_kg" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Invoice No</label>
                                    <input type="text" name="invoice_no" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Supply Date</label>
                                    <input type="date" name="supply_date" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Supplier Type</label>
                                    <select name="supplier_specific_type" class="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select</option>
                                        <option value="tea leaves">Tea Leaves</option>
                                        <option value="tea powder">Tea Powder</option>
                                        <option value="machine parts">Machine Parts</option>
                                        <option value="boxes">Boxes</option>
                                        <option value="labels & stickers">Labels & Stickers</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Transport Section -->
                        <div id="transportSection" class="hidden">
                            <h4 class="text-md font-semibold text-gray-800 mb-3"><i
                                    class="fas fa-truck mr-2"></i>Transport Details</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-50 p-4 rounded-lg">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Transport ID</label>
                                    <input type="text" name="transport_id" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle No</label>
                                    <input type="text" name="vehicle_no" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Driver Name</label>
                                    <input type="text" name="driver_name" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Distance (km)</label>
                                    <input type="number" name="distance" step="0.1"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Driver Salary</label>
                                    <input type="number" name="driver_salary" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Toll Charges</label>
                                    <input type="number" name="toll_charges" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Loading Charges</label>
                                    <input type="number" name="loading_charges" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Fuel Cost</label>
                                    <input type="number" name="fuel_cost" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Total Cost</label>
                                    <input type="number" name="total_transport_cost" step="0.01"
                                        class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Trip Date</label>
                                    <input type="date" name="trip_date" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Transport Type</label>
                                    <select name="transport_type" class="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select</option>
                                        <option value="lorry">Lorry</option>
                                        <option value="auto">Auto</option>
                                        <option value="tempo">Tempo</option>
                                        <option value="container">Container</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-end space-x-3">
                            <button type="button" onclick="toggleForm()"
                                class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">Cancel</button>
                            <button type="submit"
                                class="px-6 py-2 bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-lg hover:from-purple-600 hover:to-indigo-700 transition">Save
                                Payroll</button>
                        </div>
                    </form>
                </div>

                <!-- Payroll List -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-700 border-b">
                                    <th class="p-4 font-semibold">ID</th>
                                    <th class="p-4 font-semibold">Date</th>
                                    <th class="p-4 font-semibold">Payee</th>
                                    <th class="p-4 font-semibold">Type</th>
                                    <th class="p-4 font-semibold">Mode</th>
                                    <th class="p-4 font-semibold">Amount</th>
                                    <th class="p-4 font-semibold">Status</th>
                                </tr>
                            </thead>
                            <tbody id="payrollTableBody">
                                <tr>
                                    <td colspan="7" class="p-8 text-center text-gray-500">
                                        <div class="loader mx-auto mb-2"></div>
                                        Loading entries...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="role-utils.js"></script>
    <script src="payroll.js"></script>
</body>

</html>
