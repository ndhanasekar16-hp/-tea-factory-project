<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Collections - Tea Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-purple-600 hover:text-purple-800">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Leaf Collections</h1>
                        <p class="text-sm text-gray-600">Track daily green leaf purchases</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- List -->
            <section class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-leaf text-green-600"></i>
                            Collections
                        </h2>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Date</label>
                            <input type="date" id="filterDate"
                                class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Grade</label>
                            <select id="filterGrade"
                                class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <button id="applyFiltersBtn"
                            class="mt-5 md:mt-6 px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-semibold hover:bg-green-600 transition">
                            <i class="fas fa-filter mr-1"></i>Apply
                        </button>
                        <button id="resetFiltersBtn"
                            class="mt-5 md:mt-6 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">
                            Reset
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Date
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Bought From
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Farmer ID
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Contact
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Qty (kg)
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Grade
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Location
                                </th>
                            </tr>
                        </thead>
                        <tbody id="leafCollectionsTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    <div class="flex flex-col items-center">
                                        <div class="loader mb-4"></div>
                                        <p>Loading leaf collections...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="leafCollectionsEmptyState" class="hidden py-10 text-center text-gray-500">
                    <i class="fas fa-leaf text-4xl text-gray-300 mb-3"></i>
                    <p>No leaf collections found. Add the first record using the form on the right.</p>
                </div>
            </section>

            <!-- Form -->
            <section id="leafCollectionFormSection" class="bg-white rounded-lg shadow p-6"
                data-permission="add-leaf-collection">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-green-600"></i>
                    Add Leaf Collection
                </h2>

                <form id="leafCollectionForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" id="collectionDate" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bought From (Name)</label>
                        <input type="text" id="boughtFrom" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Farmer or collection center name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Farmer Contact</label>
                        <input type="text" id="farmerContact"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="+94 123 456 789">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Leaf Quantity (kg)</label>
                        <input type="number" id="leafQuantity" required min="0" step="0.01"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="e.g. 120.50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Leaf Grade</label>
                        <select id="leafGrade" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                            <option value="">Select grade</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Farmer Location</label>
                        <input type="text" id="farmerLocation"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Village / Estate / Area">
                    </div>

                    <button type="submit"
                        class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-2.5 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition">
                        <span id="leafCollectionSubmitText">Save Collection</span>
                        <div id="leafCollectionSubmitLoader" class="loader mx-auto hidden"></div>
                    </button>
                </form>

                <div id="leafCollectionError"
                    class="mt-3 p-2 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm hidden"></div>
                <div id="leafCollectionSuccess"
                    class="mt-3 p-2 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm hidden">
                </div>
            </section>
        </div>
    </main>

    <script src="role-utils.js"></script>
    <script src="leaf-collections.js"></script>
</body>

</html>
