<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Tea Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-purple-600 hover:text-purple-800">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Inventory</h1>
                        <p class="text-sm text-gray-600">Manage tea inventory and stock levels</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- List -->
            <section class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-box text-orange-600"></i>
                            Inventory Items
                        </h2>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Tea Type</label>
                            <select id="filterTeaType"
                                    class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="Green tea">Green tea</option>
                                <option value="black tea">black tea</option>
                                <option value="herbal tea">herbal tea</option>
                                <option value="plucked tea">plucked tea</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Grade</label>
                            <select id="filterGrade"
                                    class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="OP">OP</option>
                                <option value="BOP">BOP</option>
                                <option value="FBOP">FBOP</option>
                                <option value="Fannings">Fannings</option>
                                <option value="Dust">Dust</option>
                            </select>
                        </div>
                        <button id="applyInventoryFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-semibold hover:bg-orange-600 transition">
                            <i class="fas fa-filter mr-1"></i>Apply
                        </button>
                        <button id="resetInventoryFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">
                            Reset
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    ID
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Product Name
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Code
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Tea Type
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Grade
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Current Stock (kg)
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Location
                                </th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    <div class="flex flex-col items-center">
                                        <div class="loader mb-4"></div>
                                        <p>Loading inventory...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="inventoryEmptyState" class="hidden py-10 text-center text-gray-500">
                    <i class="fas fa-box text-4xl text-gray-300 mb-3"></i>
                    <p>No inventory items found. Add the first item using the form on the right.</p>
                </div>
            </section>

            <!-- Form -->
            <section class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-orange-600"></i>
                    Add Inventory Item
                </h2>

                <form id="inventoryForm" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                        <input type="text" id="productName" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. Premium Green Tea">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Code</label>
                        <input type="text" id="productCode" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. GT-001">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Packing Date</label>
                        <input type="date" id="packingDate" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expired Date</label>
                        <input type="date" id="expiredDate"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tea Type</label>
                        <select id="teaType" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                            <option value="">Select type</option>
                            <option value="Green tea">Green tea</option>
                            <option value="black tea">black tea</option>
                            <option value="herbal tea">herbal tea</option>
                            <option value="plucked tea">plucked tea</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Grade</label>
                        <select id="grade" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                            <option value="">Select grade</option>
                            <option value="OP">OP</option>
                            <option value="BOP">BOP</option>
                            <option value="FBOP">FBOP</option>
                            <option value="Fannings">Fannings</option>
                            <option value="Dust">Dust</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Storage Condition</label>
                        <select id="storageCondition" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                            <option value="">Select condition</option>
                            <option value="cool">cool</option>
                            <option value="dry">dry</option>
                            <option value="hot">hot</option>
                            <option value="cold">cold</option>
                            <option value="ventilated">ventilated</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Temperature (Â°C)</label>
                        <input type="number" id="temperature" step="0.1"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 25.5">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Storage Location</label>
                        <input type="text" id="storageLocation"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. Warehouse A, Shelf 3">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Opening Stock (kg)</label>
                        <input type="number" id="openingStock" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 100.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Current Stock (kg)</label>
                        <input type="number" id="currentStock" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 95.50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Damaged Stock (kg)</label>
                        <input type="number" id="damagedStock" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 2.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Total Stock Value (Rupees)</label>
                        <input type="number" id="totalStockValue" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 50000.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Selling Price (Rupees)</label>
                        <input type="number" id="sellingPrice" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 500.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cost per kg</label>
                        <input type="number" id="costPerKg" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. 400.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Used In</label>
                        <input type="text" id="usedIn"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                               placeholder="e.g. Production Batch #123">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Remarks</label>
                        <textarea id="remarks" rows="3"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                  placeholder="Additional notes"></textarea>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-2.5 rounded-lg font-semibold hover:from-orange-600 hover:to-orange-700 transition">
                        <span id="inventorySubmitText">Save Inventory</span>
                        <div id="inventorySubmitLoader" class="loader mx-auto hidden"></div>
                    </button>
                </form>

                <div id="inventoryError" class="mt-3 p-2 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm hidden"></div>
                <div id="inventorySuccess" class="mt-3 p-2 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm hidden"></div>
            </section>
        </div>
    </main>

    
    <script src="role-utils.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
