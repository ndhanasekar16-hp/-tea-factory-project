<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport - Tea Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-purple-600 hover:text-purple-800">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Transport</h1>
                        <p class="text-sm text-gray-600">Manage vehicle transport and logistics</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- List -->
            <section class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-truck-loading text-blue-600"></i>
                            Transport Records
                        </h2>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Vehicle Type</label>
                            <select id="filterVehicleType"
                                    class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="Lorry">Lorry</option>
                                <option value="truck">truck</option>
                                <option value="tempo">tempo</option>
                                <option value="container">container</option>
                                <option value="auto">auto</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Material Type</label>
                            <select id="filterMaterialType"
                                    class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="">All</option>
                                <option value="green leaf">green leaf</option>
                                <option value="tea powder">tea powder</option>
                                <option value="gunny bags">gunny bags</option>
                                <option value="tin containers">tin containers</option>
                                <option value="labels & stickers">labels & stickers</option>
                                <option value="machinery parts">machinery parts</option>
                                <option value="fuels">fuels</option>
                                <option value="chemicals">chemicals</option>
                            </select>
                        </div>
                        <button id="applyTransportFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 transition">
                            <i class="fas fa-filter mr-1"></i>Apply
                        </button>
                        <button id="resetTransportFiltersBtn"
                                class="mt-5 md:mt-6 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">
                            Reset
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Transport ID
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Vehicle No
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Driver Name
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Vehicle Type
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Route
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Quantity (kg)
                                </th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status
                                </th>
                            </tr>
                        </thead>
                        <tbody id="transportTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    <div class="flex flex-col items-center">
                                        <div class="loader mb-4"></div>
                                        <p>Loading transport records...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="transportEmptyState" class="hidden py-10 text-center text-gray-500">
                    <i class="fas fa-truck-loading text-4xl text-gray-300 mb-3"></i>
                    <p>No transport records found. Add the first record using the form on the right.</p>
                </div>
            </section>

            <!-- Form -->
            <section class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-blue-600"></i>
                    Add Transport
                </h2>

                <form id="transportForm" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Number</label>
                        <input type="text" id="vehicleNumber" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. TN-01-AB-1234">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Driver Name</label>
                        <input type="text" id="driverName" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. Ramesh Kumar">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Driver ID</label>
                        <input type="text" id="driverId" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. DRV-001">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
                        <input type="text" id="contactNumber" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. +91 9876543210">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">License Number</label>
                        <input type="text" id="licenseNumber" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. DL-1234567890">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Capacity</label>
                        <input type="number" id="vehicleCapacity" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 5000.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Source Location</label>
                        <input type="text" id="sourceLocation" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. Factory, Kandy">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Destination Location</label>
                        <input type="text" id="destinationLocation" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. Warehouse, Colombo">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">GPS Tracking ID</label>
                        <input type="text" id="gpsTrackingId"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. GPS-12345">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Distance (km)</label>
                        <input type="number" id="distanceKm" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 150.50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
                        <input type="number" id="quantityKg" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 2000.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cost per kg</label>
                        <input type="number" id="costPerKg" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 5.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fuel Consumption (ltrs)</label>
                        <input type="number" id="fuelConsumptionLtrs" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 50.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fuel Cost</label>
                        <input type="number" id="fuelCost" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 3500.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Toll Charges</label>
                        <input type="number" id="tollCharges" required min="0" step="0.01"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. 500.00">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Transport Date</label>
                        <input type="date" id="transportDate" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Delivered Date</label>
                        <input type="date" id="deliveredDate"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Starting Time</label>
                        <input type="time" id="startingTime" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Arrival Time</label>
                        <input type="time" id="arrivalTime"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Delay Reason</label>
                        <input type="text" id="delayReason"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="Reason for delay if any">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Type</label>
                        <select id="vehicleType" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select type</option>
                            <option value="Lorry">Lorry</option>
                            <option value="truck">truck</option>
                            <option value="tempo">tempo</option>
                            <option value="container">container</option>
                            <option value="auto">auto</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Material Type</label>
                        <select id="materialType" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select material</option>
                            <option value="green leaf">green leaf</option>
                            <option value="tea powder">tea powder</option>
                            <option value="gunny bags">gunny bags</option>
                            <option value="tin containers">tin containers</option>
                            <option value="labels & stickers">labels & stickers</option>
                            <option value="machinery parts">machinery parts</option>
                            <option value="fuels">fuels</option>
                            <option value="chemicals">chemicals</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Packaging Type</label>
                        <select id="packagingType" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select packaging</option>
                            <option value="zip lock pouches">zip lock pouches</option>
                            <option value="plastic tray boxes">plastic tray boxes</option>
                            <option value="wooden crates">wooden crates</option>
                            <option value="jute bags">jute bags</option>
                            <option value="ventilated bags">ventilated bags</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Deliver Confirmation</label>
                        <select id="deliverConfirmation" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select confirmation</option>
                            <option value="yes">yes</option>
                            <option value="no">no</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Receiver Name</label>
                        <input type="text" id="receiverName"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g. Warehouse Manager">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Receiver Signature (Digital)</label>
                        <input type="text" id="receiverSignature"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="Digital signature or signature ID">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Remarks</label>
                        <textarea id="remarks" rows="3"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                  placeholder="Additional notes"></textarea>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-2.5 rounded-lg font-semibold hover:from-blue-600 hover:to-blue-700 transition">
                        <span id="transportSubmitText">Save Transport</span>
                        <div id="transportSubmitLoader" class="loader mx-auto hidden"></div>
                    </button>
                </form>

                <div id="transportError" class="mt-3 p-2 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm hidden"></div>
                <div id="transportSuccess" class="mt-3 p-2 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm hidden"></div>
            </section>
        </div>
    </main>

    
    <script src="role-utils.js"></script>
    <script src="transport.js"></script>
</body>
</html>
