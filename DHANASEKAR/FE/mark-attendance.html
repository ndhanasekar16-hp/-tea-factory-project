<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Production System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="mark-attendance.css">
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <a href="index.html" class="inline-flex items-center text-purple-600 hover:text-purple-800 mb-4">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                </a>
                <div class="glass-effect rounded-2xl shadow-2xl p-6">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-16 h-16 bg-gradient-to-r from-green-500 to-green-600 rounded-full flex items-center justify-center">
                            <i class="fas fa-clipboard-check text-white text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold text-gray-800">Mark Attendance</h1>
                            <p class="text-gray-600">Record attendance for all employees</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <div class="glass-effect rounded-2xl shadow-2xl p-8 fade-in">
                <form id="attendanceForm" class="space-y-6">
                    <!-- Date Selection -->
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-calendar mr-2"></i>Attendance Date <span class="text-red-500">*</span>
                        </label>
                        <input type="date" id="attendanceDate" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
                    </div>

                    <!-- Employees List -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold text-gray-800">Select Employee Status</h2>
                            <div class="flex items-center space-x-4">
                                <button type="button" onclick="markAllPresent()" 
                                        class="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition text-sm font-medium">
                                    <i class="fas fa-check-circle mr-2"></i>Mark All Present
                                </button>
                                <button type="button" onclick="markAllLeave()" 
                                        class="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition text-sm font-medium">
                                    <i class="fas fa-times-circle mr-2"></i>Mark All Leave
                                </button>
                            </div>
                        </div>

                        <div id="employeesList" class="space-y-3">
                            <div class="text-center py-8">
                                <div class="loader mx-auto mb-4"></div>
                                <p class="text-gray-600">Loading employees...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex items-center space-x-4 pt-4 border-t border-gray-200">
                        <button type="submit" id="submitBtn"
                                class="flex-1 bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition transform hover:scale-105">
                            <span id="submitBtnText">
                                <i class="fas fa-save mr-2"></i>Save Attendance
                            </span>
                            <div id="submitLoader" class="loader mx-auto hidden"></div>
                        </button>
                        <a href="attendance.html" 
                           class="px-6 py-3 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition">
                            View Records
                        </a>
                    </div>
                </form>

                <div id="formError" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg hidden"></div>
                <div id="formSuccess" class="mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg hidden"></div>
            </div>
        </div>
    </div>

    <script src="role-utils.js"></script>
    <script src="mark-attendance.js"></script>
</body>
</html>
